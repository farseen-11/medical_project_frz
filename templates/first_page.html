<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal | Welcome</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-grad-1: #050816;
            --bg-grad-2: #1a1034;
            --accent: #7c3aed;
            --accent-neon: #4ade80;
            --primary-color: #7c3aed;
            --primary-hover: #4f46e5;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --card-bg: rgba(15, 23, 42, 0.9);
            --card-border: rgba(148, 163, 184, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background:
                radial-gradient(circle at 0% 0%, rgba(56,189,248,0.15), transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(129,140,248,0.18), transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(52,211,153,0.16), transparent 50%),
                linear-gradient(145deg, var(--bg-grad-1), var(--bg-grad-2));
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        /* Floating orbs */
        .orb {
            position: absolute;
            border-radius: 999px;
            filter: blur(40px);
            opacity: 0.7;
            pointer-events: none;
        }

        .orb.orb-1 {
            width: 260px;
            height: 260px;
            background: rgba(56, 189, 248, 0.5);
            top: -80px;
            right: -40px;
            animation: float1 16s infinite alternate ease-in-out;
        }

        .orb.orb-2 {
            width: 320px;
            height: 320px;
            background: rgba(129, 140, 248, 0.4);
            bottom: -120px;
            left: -80px;
            animation: float2 18s infinite alternate ease-in-out;
        }

        @keyframes float1 {
            from { transform: translate3d(0, 0, 0); }
            to   { transform: translate3d(-40px, 60px, 0); }
        }

        @keyframes float2 {
            from { transform: translate3d(0, 0, 0); }
            to   { transform: translate3d(60px, -40px, 0); }
        }

        /* Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2.6rem 2.4rem 2.3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow:
                0 24px 60px rgba(15,23,42,0.9),
                0 0 0 1px rgba(148,163,184,0.18);
            border: 1px solid var(--card-border);
            transform: translateY(0);
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 1;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow:
                0 30px 70px rgba(79,70,229,0.6),
                0 0 0 1px rgba(129,140,248,0.4);
        }

        /* Icon */
        .icon-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 22px;
            background: radial-gradient(circle at 30% 30%, var(--accent-neon), var(--accent));
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.4rem;
            color: #020617;
            box-shadow:
                0 0 20px rgba(74, 222, 128, 0.5),
                inset 0 0 0 1px rgba(15, 23, 42, 0.7);
            transform: rotate(-6deg);
            transition: transform 0.3s ease;
        }

        .card:hover .icon-wrapper {
            transform: rotate(0deg) scale(1.05);
        }

        .icon-wrapper svg {
            width: 40px;
            height: 40px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.03em;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2.1rem;
            font-size: 0.95rem;
            line-height: 1.7;
            padding: 0 6px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            color: #e5e7eb;
            background: rgba(15,23,42,0.9);
            border: 1px solid rgba(148,163,184,0.5);
            margin-bottom: 0.9rem;
            opacity: 0.9;
        }

        .pill span {
            font-size: 12px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        button {
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .signup-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: white;
            box-shadow:
                0 18px 40px rgba(79,70,229,0.65),
                0 0 18px rgba(79,70,229,0.55);
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow:
                0 23px 50px rgba(79,70,229,0.85),
                0 0 22px rgba(74,222,128,0.5);
        }

        .signin-btn {
            background: rgba(15,23,42,0.9);
            color: white;
            border: 1px solid rgba(148,163,184,0.6);
            box-shadow: 0 12px 30px rgba(15,23,42,0.7);
        }

        .signin-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            box-shadow:
                0 18px 36px rgba(15,23,42,0.9),
                0 0 0 1px rgba(129,140,248,0.4);
        }

        .signup-btn svg {
            width: 18px;
            height: 18px;
            transition: transform 0.3s ease;
        }

        .signup-btn:hover svg {
            transform: translateX(4px);
        }

        /* 🚑 Small Emergency Button (Top Right) – unchanged */
        .emergency-btn {
            position: fixed;
            top: 18px;
            right: 18px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            z-index: 999;
            box-shadow:
                0 0 12px rgba(239,68,68,0.6),
                0 6px 12px rgba(0,0,0,0.4);
            transition: 0.25s;
        }

        .emergency-btn:hover {
            transform: scale(1.08);
        }

        @media (max-width: 480px) {
            .card {
                margin: 1.5rem;
                padding: 2.3rem 1.7rem 2rem;
            }
        }
    </style>
</head>

<body>

<!-- 🚑 Emergency Button (unchanged) -->
<button class="emergency-btn"
        onclick="window.location.href='emergency.html'">
    🚑 Emergency
</button>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card">
    <div class="icon-wrapper">
        <!-- Hospital icon -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
        </svg>
    </div>

    <div class="pill">
        <span>🔐</span> Secure, AI‑assisted healthcare access
    </div>

    <h1>Patient Portal</h1>
    <p>Access your medical profile, track health history, and manage appointments in an intelligent, privacy‑first workspace.</p>

    <div class="button-group">
        <button class="signup-btn" onclick="location.href='index.html'">
            <span>Register</span>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M14 5l7 7m0 0l-7 7m7-7H3" />
            </svg>
        </button>

        <button class="signin-btn" onclick="location.href='signin.html'">
            Login
        </button>
    </div>
</div>

</body>
</html>
