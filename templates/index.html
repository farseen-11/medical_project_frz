<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Registration</title>

    <!-- Font to match other pages -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-grad-1: #050816;
            --bg-grad-2: #1a1034;
            --accent: #7c3aed;
            --accent-soft: rgba(124, 58, 237, 0.25);
            --accent-neon: #4ade80;
            --danger: #f97373;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --card-bg: rgba(15, 23, 42, 0.9);
            --card-border: rgba(148, 163, 184, 0.4);
            --input-bg: rgba(15, 23, 42, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            background:
                radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.15), transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(129, 140, 248, 0.15), transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(52, 211, 153, 0.15), transparent 50%),
                linear-gradient(145deg, var(--bg-grad-1), var(--bg-grad-2));
            overflow: hidden;
            position: relative;
        }

        /* Ambient orbs */
        .orb {
            position: absolute;
            border-radius: 999px;
            filter: blur(40px);
            opacity: 0.7;
            pointer-events: none;
        }

        .orb.orb-1 {
            width: 260px;
            height: 260px;
            background: rgba(56, 189, 248, 0.55);
            top: -80px;
            left: -60px;
            animation: float1 15s infinite alternate ease-in-out;
        }

        .orb.orb-2 {
            width: 320px;
            height: 320px;
            background: rgba(129, 140, 248, 0.45);
            bottom: -120px;
            right: -80px;
            animation: float2 18s infinite alternate ease-in-out;
        }

        @keyframes float1 {
            from { transform: translate3d(0, 0, 0); }
            to   { transform: translate3d(40px, 60px, 0); }
        }

        @keyframes float2 {
            from { transform: translate3d(0, 0, 0); }
            to   { transform: translate3d(-60px, -40px, 0); }
        }

        .back-btn {
            position: absolute;
            top: 24px;
            left: 28px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 14px;
            text-decoration: none;
            color: var(--text-main);
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(148, 163, 184, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all 0.18s ease-out;
            z-index: 2;
        }

        .back-btn span {
            font-size: 18px;
            line-height: 1;
        }

        .back-btn:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px rgba(129, 140, 248, 0.4),
                        0 18px 35px rgba(15, 23, 42, 0.9);
            transform: translateY(-1px);
        }

        .container {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            padding: 26px 30px 24px;
            border-radius: 20px;
            width: 360px;
            box-shadow:
                0 24px 60px rgba(15, 23, 42, 0.9),
                0 0 0 1px rgba(148, 163, 184, 0.16);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        h2 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 0.03em;
        }

        .subtitle {
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .icon-badge {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .icon-hospital {
            width: 32px;
            height: 32px;
            border-radius: 999px;
            background: radial-gradient(circle at 30% 30%, var(--accent-neon), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #020617;
            box-shadow:
                0 0 18px rgba(74, 222, 128, 0.4),
                inset 0 0 0 1px rgba(15, 23, 42, 0.7);
        }

        .badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: #e5e7eb;
            border: 1px solid rgba(129, 140, 248, 0.4);
        }

        .field {
            margin-bottom: 10px;
        }

        .field label {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .field input,
        .field select {
            width: 100%;
            padding: 9px 11px;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.6);
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 13px;
            outline: none;
            transition: all 0.18s ease-out;
        }

        .field input::placeholder {
            color: rgba(148, 163, 184, 0.8);
        }

        .field select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: linear-gradient(45deg, transparent 50%, #9ca3af 50%),
                              linear-gradient(135deg, #9ca3af 50%, transparent 50%);
            background-position: calc(100% - 14px) 13px, calc(100% - 9px) 13px;
            background-size: 5px 5px, 5px 5px;
            background-repeat: no-repeat;
        }

        .field input:focus,
        .field select:focus {
            border-color: var(--accent);
            box-shadow:
                0 0 0 1px rgba(129, 140, 248, 0.4),
                0 0 0 6px rgba(129, 140, 248, 0.07);
        }

        button {
            width: 100%;
            padding: 11px 12px;
            margin-top: 10px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: #f9fafb;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.03em;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow:
                0 18px 40px rgba(79, 70, 229, 0.65),
                0 0 18px rgba(79, 70, 229, 0.55);
            transition: all 0.18s ease-out;
        }

        button span {
            font-size: 16px;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow:
                0 23px 50px rgba(79, 70, 229, 0.85),
                0 0 22px rgba(74, 222, 128, 0.55);
        }

        button:active {
            transform: translateY(0);
            box-shadow:
                0 12px 30px rgba(15, 23, 42, 0.95);
        }

        .hint {
            margin-top: 8px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .error-inline {
            margin-top: 4px;
            font-size: 11px;
            color: var(--danger);
            min-height: 14px;
        }

        /* Welcome animation overlay */
        .welcome-screen {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 10% 0%, rgba(56, 189, 248, 0.25), transparent 55%),
                radial-gradient(circle at 100% 90%, rgba(74, 222, 128, 0.2), transparent 55%),
                linear-gradient(135deg, #111827, #020617);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e5e7eb;
            font-size: 28px;
            font-weight: 600;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .welcome-screen.show {
            opacity: 1;
            visibility: visible;
        }

        .welcome-text {
            padding: 22px 26px;
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.5);
            box-shadow:
                0 24px 60px rgba(15, 23, 42, 0.9),
                0 0 0 1px rgba(148, 163, 184, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: pop 0.8s ease;
        }

        .welcome-text span {
            color: var(--accent-neon);
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>

<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<a href="first_page.html" class="back-btn">
    <span>←</span>
    <span>Back</span>
</a>

<!-- Welcome screen -->
<div id="welcomeScreen" class="welcome-screen">
    <div id="welcomeText" class="welcome-text"></div>
</div>

<div class="container">
    <div class="header-row">
        <div>
            <h2>Patient Registration</h2>
            <div class="subtitle">Create a secure profile to continue</div>
        </div>
        <div class="icon-badge">
            <div class="icon-hospital">🏥</div>
            <div class="badge">New patient</div>
        </div>
    </div>

    <form id="patientForm" novalidate>
        <div class="field">
            <label for="name">Full name</label>
            <input type="text" id="name" placeholder="John Doe" required>
        </div>

        <div class="field">
            <label for="age">Age</label>
            <input type="number" id="age" placeholder="35" min="0" required>
        </div>

        <div class="field">
            <label for="gender">Gender</label>
            <select id="gender" required>
                <option value="">Select gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Others</option>
            </select>
        </div>

        <div class="field">
            <label for="phone">Phone</label>
            <input type="number" id="phone" placeholder="+91 9876543210" required>
        </div>

        <div class="field">
            <label for="e_mail">Email</label>
            <input type="email" id="e_mail" placeholder="name@example.com" required>
        </div>

        <div class="field">
            <label for="new_password">Password</label>
            <input type="password" id="new_password" placeholder="••••••••••" required>
        </div>

        <div class="field">
            <label for="confirm_password">Confirm password</label>
            <input type="password" id="confirm_password" placeholder="••••••••••" required>
            <div id="errorText" class="error-inline"></div>
        </div>

        <button type="submit">
            <span>Register</span>
            <span>›</span>
        </button>

        <div class="hint">
            Your data is encrypted in transit. Use a strong password that you do not reuse elsewhere.
        </div>
    </form>
</div>

<script>
document.getElementById("patientForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const nameInput = document.getElementById("name");
    let patientName = nameInput.value.trim();

    const password = document.getElementById("new_password").value;
    const confirmPassword = document.getElementById("confirm_password").value;
    const errorText = document.getElementById("errorText");

    if (!patientName) {
        errorText.textContent = "Enter your name.";
        nameInput.focus();
        return;
    }

    if (password !== confirmPassword) {
        errorText.textContent = "Passwords do not match.";
        return;
    } else {
        errorText.textContent = "";
    }

    const data = {
        name: patientName,
        age: parseInt(document.getElementById("age").value),
        gender: document.getElementById("gender").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("e_mail").value,
        password: password
    };

    try {
        const res = await fetch("http://127.0.0.1:8000/patients/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        if (!res.ok) throw new Error();

        const screen = document.getElementById("welcomeScreen");
        const text = document.getElementById("welcomeText");

        text.innerHTML = `Welcome <span>${patientName}</span> 👋`;
        screen.classList.add("show");

        setTimeout(() => {
            window.location.href = "main.html";
        }, 2000);

    } catch (err) {
        errorText.textContent = "Server error. Please try again.";
        console.log(err);
    }
});
</script>

</body>
</html>
