<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedWorld AI</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-grad-1: #050816;
            --bg-grad-2: #1a1034;
            --accent: #7c3aed;
            --accent-soft: rgba(124, 58, 237, 0.25);
            --accent-neon: #4ade80;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --card-bg: rgba(15, 23, 42, 0.9);
            --card-border: rgba(148, 163, 184, 0.4);
            --input-bg: rgba(15, 23, 42, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            background:
                radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.15), transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(129, 140, 248, 0.15), transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(52, 211, 153, 0.15), transparent 50%),
                linear-gradient(145deg, var(--bg-grad-1), var(--bg-grad-2));
            overflow: hidden;
            position: relative;
        }

        .orb {
            position: absolute;
            border-radius: 999px;
            filter: blur(40px);
            opacity: 0.7;
            pointer-events: none;
        }

        .orb.orb-1 {
            width: 260px;
            height: 260px;
            background: rgba(56, 189, 248, 0.55);
            top: -80px;
            left: -60px;
            animation: float1 16s infinite alternate ease-in-out;
        }

        .orb.orb-2 {
            width: 320px;
            height: 320px;
            background: rgba(129, 140, 248, 0.45);
            bottom: -120px;
            right: -80px;
            animation: float2 18s infinite alternate ease-in-out;
        }

        @keyframes float1 {
            from { transform: translate3d(0, 0, 0); }
            to   { transform: translate3d(40px, 60px, 0); }
        }

        @keyframes float2 {
            from { transform: translate3d(0, 0, 0); }
            to   { transform: translate3d(-60px, -40px, 0); }
        }

        .box {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            padding: 26px 30px 22px;
            width: 460px;
            border-radius: 20px;
            box-shadow:
                0 24px 60px rgba(15, 23, 42, 0.9),
                0 0 0 1px rgba(148, 163, 184, 0.18);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        h2 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 0.03em;
        }

        .subtitle {
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .icon-badge {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .icon-brain {
            width: 36px;
            height: 36px;
            border-radius: 999px;
            background: radial-gradient(circle at 30% 30%, var(--accent-neon), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #020617;
            box-shadow:
                0 0 18px rgba(74, 222, 128, 0.4),
                inset 0 0 0 1px rgba(15, 23, 42, 0.7);
        }

        .badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: #e5e7eb;
            border: 1px solid rgba(129, 140, 248, 0.4);
        }

        textarea {
            width: 100%;
            min-height: 110px;
            margin-top: 10px;
            padding: 10px 11px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.6);
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 13px;
            resize: vertical;
            outline: none;
            transition: all 0.18s ease-out;
        }

        textarea::placeholder {
            color: rgba(148, 163, 184, 0.8);
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow:
                0 0 0 1px rgba(129, 140, 248, 0.4),
                0 0 0 6px rgba(129, 140, 248, 0.07);
        }

        button {
            width: 100%;
            margin-top: 12px;
            padding: 11px 12px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: #f9fafb;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.03em;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow:
                0 18px 40px rgba(79, 70, 229, 0.65),
                0 0 18px rgba(79, 70, 229, 0.55);
            transition: all 0.18s ease-out;
        }

        button span {
            font-size: 16px;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow:
                0 23px 50px rgba(79, 70, 229, 0.85),
                0 0 22px rgba(74, 222, 128, 0.55);
        }

        button:active {
            transform: translateY(0);
            box-shadow:
                0 12px 30px rgba(15, 23, 42, 0.95);
        }

        ul {
            margin-top: 14px;
            padding-left: 18px;
            font-size: 13px;
        }

        ul li {
            margin-bottom: 4px;
        }

        .doctor-box {
            margin-top: 16px;
            padding: 12px 12px 10px;
            border-radius: 14px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.5);
            box-shadow:
                0 12px 32px rgba(15, 23, 42, 0.8);
            font-size: 13px;
        }

        .doctor-box h3 {
            margin: 0 0 4px;
            font-size: 14px;
        }

        .doctor-box p {
            margin: 2px 0;
            font-size: 12px;
            color: var(--text-muted);
        }

        #doctorBtn, #closeBtn {
            margin-top: 10px;
        }

        #closeBtn {
            background: rgba(15, 23, 42, 0.9);
            box-shadow:
                0 10px 24px rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.7);
        }

        /* Back button */
        .back-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 14px;
            text-decoration: none;
            color: var(--text-main);
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(148, 163, 184, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all 0.18s ease-out;
            z-index: 2;
        }

        .back-btn span {
            font-size: 18px;
            line-height: 1;
        }

        .back-btn:hover {
            border-color: var(--accent);
            box-shadow:
                0 0 0 1px rgba(129, 140, 248, 0.4),
                0 18px 35px rgba(15, 23, 42, 0.9);
            transform: translateY(-1px);
        }

        /* Thank you overlay */
        #thankYou {
            display: none;
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 10% 0%, rgba(56, 189, 248, 0.25), transparent 55%),
                radial-gradient(circle at 100% 90%, rgba(74, 222, 128, 0.2), transparent 55%),
                linear-gradient(135deg, #111827, #020617);
            color: #e5e7eb;
            font-size: 28px;
            font-weight: 600;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 1000;
        }

        #thankYou-inner {
            padding: 22px 26px;
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.5);
            box-shadow:
                0 24px 60px rgba(15, 23, 42, 0.9),
                0 0 0 1px rgba(148, 163, 184, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: pop 0.8s ease;
        }

        #thankYou-inner span {
            color: var(--accent-neon);
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>

<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<a href="first_page.html" class="back-btn">
    <span>←</span>
    <span>Back</span>
</a>

<div class="box" id="mainBox">
    <div class="header-row">
        <div>
            <h2>MedWorld AI</h2>
            <div class="subtitle">Symptom-based disease prediction</div>
        </div>
        <div class="icon-badge">
            <div class="icon-brain">🧠</div>
            <div class="badge">AI model • v1.0</div>
        </div>
    </div>

    <textarea id="symptoms" placeholder="Enter symptoms separated by commas (e.g., fever, cough, headache)"></textarea>

    <button onclick="predict()">
        <span>Predict</span>
        <span>›</span>
    </button>

    <ul id="results"></ul>

    <div class="doctor-box">
        <h3 id="doctor"></h3>
        <p id="urgency"></p>
        <p id="reason"></p>
    </div>

    <button id="doctorBtn" style="display:none;" onclick="goToMap()">
        <span>Doctor Recommendation</span>
    </button>

    <button id="closeBtn" style="display:none;" onclick="closeSession()">
        <span>Close</span>
    </button>
</div>

<div id="thankYou">
    <div id="thankYou-inner">
        Thanks for choosing <span>MedWorld AI</span>
    </div>
</div>

<script>
// store doctor globally
let recommendedDoctor = "";

// AI prediction
async function predict() {
    const symptoms = document.getElementById("symptoms").value;
    const resultsBox = document.getElementById("results");

    resultsBox.innerHTML = "⏳ Predicting...";

    const res = await fetch("http://127.0.0.1:8000/prediction", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            symptoms: symptoms,
            top_k: 5
        })
    });

    const data = await res.json();
    console.log(data);

    resultsBox.innerHTML = "";
    data.results.forEach(item => {
        const li = document.createElement("li");
        li.innerText = `${item.disease} → ${(item.confidence * 100).toFixed(2)}%`;
        resultsBox.appendChild(li);
    });

    recommendedDoctor = data.doctor;

    document.getElementById("doctor").innerText =
        "Recommended doctor: " + data.doctor;

    document.getElementById("urgency").innerText =
        "Urgency: " + data.urgency;

    document.getElementById("reason").innerText =
        "Reason: " + data.reason;

    document.getElementById("doctorBtn").style.display = "inline-flex";
    document.getElementById("closeBtn").style.display = "inline-flex";
}

// redirect to map
function goToMap() {
    if (!recommendedDoctor) {
        alert("Doctor recommendation not available");
        return;
    }
    window.location.href =
        `mapp.html?doctor=${encodeURIComponent(recommendedDoctor)}`;
}

// close session
function closeSession() {
    document.getElementById("mainBox").style.display = "none";

    const thank = document.getElementById("thankYou");
    thank.style.display = "flex";

    setTimeout(() => {
        window.location.href = "first_page.html";
    }, 2000);
}
</script>

</body>
</html>
