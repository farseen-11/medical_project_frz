<!DOCTYPE html>
<html>
<head>
    <title>Nearby Specialist Hospitals</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-grad-1: #050816;
            --bg-grad-2: #1a1034;
            --accent: #7c3aed;
            --accent-neon: #4ade80;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --card-bg: rgba(15, 23, 42, 0.95);
            --pill-bg: rgba(15, 23, 42, 0.88);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 0% 0%, rgba(56,189,248,0.15), transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(129,140,248,0.15), transparent 50%),
                linear-gradient(145deg, var(--bg-grad-1), var(--bg-grad-2));
            color: var(--text-main);
            min-height: 100vh;
            padding: 26px 18px;
        }

        .wrapper {
            max-width: 720px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 18px 18px 14px;
            box-shadow:
                0 24px 60px rgba(15,23,42,0.9),
                0 0 0 1px rgba(148,163,184,0.18);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .header-text {
            text-align: left;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 3px;
        }

        .sub {
            font-size: 12px;
            color: var(--text-muted);
        }

        .icon-wrapper {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            background: radial-gradient(circle at 30% 30%, var(--accent-neon), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #020617;
            box-shadow:
                0 0 18px rgba(74,222,128,0.5),
                inset 0 0 0 1px rgba(15,23,42,0.7);
        }

        .icon-wrapper span {
            font-size: 22px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 8px;
            max-height: 420px;
            overflow-y: auto;
        }

        li {
            background: var(--pill-bg);
            margin: 8px 0;
            padding: 11px 12px 9px;
            border-radius: 12px;
            border: 1px solid rgba(148,163,184,0.5);
            font-size: 13px;
        }

        .title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 3px;
        }

        .distance {
            color: var(--accent-neon);
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .address {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .actions {
            margin-top: 6px;
        }

        button {
            padding: 7px 11px;
            margin-top: 4px;
            margin-right: 6px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: white;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            box-shadow:
                0 10px 24px rgba(79,70,229,0.7),
                0 0 12px rgba(79,70,229,0.55);
            transition: all 0.18s ease-out;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow:
                0 14px 32px rgba(79,70,229,0.85),
                0 0 16px rgba(74,222,128,0.5);
        }

        /* Back button */
        .back-btn {
            position: fixed;
            top: 18px;
            left: 18px;
            background: rgba(15,23,42,0.96);
            border-radius: 999px;
            border: 1px solid rgba(148,163,184,0.8);
            padding: 7px 13px;
            color: var(--text-main);
            font-size: 12px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            box-shadow:
                0 12px 26px rgba(15,23,42,0.95);
            z-index: 10;
        }

        .back-btn:hover {
            background: #020617;
        }
    </style>
</head>

<body>

<!-- Back button -->
<button class="back-btn" onclick="goBack()">
    <span>←</span>
    <span>Back</span>
</button>

<div class="wrapper">
    <div class="card">
        <div class="header-row">
            <div class="header-text">
                <h2 id="heading">Nearby Specialist Hospitals</h2>
                <div class="sub">Prioritized by specialty match and distance</div>
            </div>
            <div class="icon-wrapper">
                <span>🏥</span>
            </div>
        </div>

        <ul id="hospitalList">
            <li>
                <div class="title">Loading nearby hospitals...</div>
                <div class="address">Please allow location access to see closest options.</div>
            </li>
        </ul>
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const doctorType = params.get("doctor");

if (doctorType) {
    document.getElementById("heading").innerText =
        `Nearby ${doctorType} Hospitals`;
}

// DISTANCE
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI/180) *
        Math.cos(lat2 * Math.PI/180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return (R * c).toFixed(2);
}

// CALL + MAP
function callHospital(phone) {
    window.location.href = `tel:${phone}`;
}

function openMap(lat, lng) {
    const url = `https://www.google.com/maps?q=${lat},${lng}`;
    window.open(url, "_blank");
}

// LOCATION + FETCH
navigator.geolocation.getCurrentPosition(async (pos) => {

    const userLat = pos.coords.latitude;
    const userLon = pos.coords.longitude;

    const res = await fetch(
        `http://127.0.0.1:8000/nearby_hospitals?lat=${userLat}&lon=${userLon}`
    );

    let data = await res.json();

    // distance
    data.hospitals.forEach(h => {
        if (h.lat && h.lon) {
            h.distance = parseFloat(
                getDistance(userLat, userLon, h.lat, h.lon)
            );
        } else {
            h.distance = 999;
        }
    });

    // specialist priority
    if (doctorType) {

        let matched = [];
        let others = [];

        data.hospitals.forEach(h => {
            if (
                h.categories &&
                h.categories.some(cat =>
                    cat.toLowerCase().includes(doctorType.toLowerCase())
                )
            ) {
                matched.push(h);
            } else {
                others.push(h);
            }
        });

        matched.sort((a, b) => a.distance - b.distance);
        others.sort((a, b) => a.distance - b.distance);

        data.hospitals = [...matched, ...others];
    } else {
        data.hospitals.sort((a, b) => a.distance - b.distance);
    }

    const list = document.getElementById("hospitalList");
    list.innerHTML = "";

    data.hospitals.forEach(h => {

        let callBtn = "";
        if (h.phone) {
            callBtn = `
                <button onclick="callHospital('${h.phone}')">
                    <span>📞</span><span>Call</span>
                </button>`;
        }

        let mapBtn = "";
        if (h.lat && h.lon) {
            mapBtn = `
                <button onclick="openMap(${h.lat}, ${h.lon})">
                    <span>🗺</span><span>Map</span>
                </button>`;
        }

        const li = document.createElement("li");

        li.innerHTML = `
            <div class="title">${h.title}</div>
            <div class="distance">${h.distance} km away</div>
            <div class="address">${h.address || "Address not available"}</div>
            <div class="actions">
                ${callBtn} ${mapBtn}
            </div>
        `;

        list.appendChild(li);
    });

});

// BACK
function goBack() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
